name: Sync App Store Events

on:
  schedule:
    - cron: '0 6 * * *' # 6am UTC
    - cron: '0 18 * * *' # 6pm UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Scrape events from App Store
        run: python -m backend.scrape_events

      - name: Normalize events data
        run: python -m backend.normalize_data events.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json data/changes/events.json frontend/src/assets/event/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-sync: update events from App Store"
            git push
          fi
